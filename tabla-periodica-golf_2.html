<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f4f0; min-height: 100vh; padding: 1rem; }

header { text-align: center; margin-bottom: 1rem; }
header h1 { font-size: 22px; font-weight: 700; color: #1a1a18; margin-bottom: 4px; }
header p { font-size: 13px; color: #888780; }
header .club { font-size: 12px; color: #639922; font-weight: 600; margin-top: 5px; letter-spacing: 0.5px; }

.legend { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-bottom: 1rem; }
.leg-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #5F5E5A; background: #fff; border: 0.5px solid #D3D1C7; border-radius: 6px; padding: 3px 7px; }
.leg-dot { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }

.grid {
  display: grid;
  grid-template-columns: repeat(18, minmax(0, 1fr));
  gap: 3px;
  max-width: 1100px;
  margin: 0 auto;
}
.cell {
  border-radius: 5px;
  padding: 4px 2px 3px;
  cursor: pointer;
  transition: transform 0.12s, box-shadow 0.12s;
  min-height: 56px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border: 0.5px solid transparent;
  -webkit-tap-highlight-color: transparent;
}
.cell:hover, .cell:active { transform: scale(1.1); z-index: 10; box-shadow: 0 4px 14px rgba(0,0,0,0.18); }
.cell .num { font-size: 8px; opacity: 0.65; align-self: flex-start; padding-left: 3px; }
.cell .sym { font-size: 13px; font-weight: 700; line-height: 1; }
.cell .name { font-size: 6px; text-align: center; line-height: 1.2; margin-top: 1px; }
.empty { opacity: 0; pointer-events: none; }

.mobile-view { display: none; }
.cat-section { margin-bottom: 1.2rem; }
.cat-title { font-size: 12px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 6px; padding: 4px 10px; border-radius: 6px; display: inline-block; }
.mobile-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
.mobile-cell {
  border-radius: 8px; padding: 8px 4px 6px; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  border: 0.5px solid transparent; min-height: 64px;
  -webkit-tap-highlight-color: transparent; transition: transform 0.1s;
}
.mobile-cell:active { transform: scale(0.95); }
.mobile-cell .num { font-size: 9px; opacity: 0.6; align-self: flex-start; padding-left: 4px; }
.mobile-cell .sym { font-size: 18px; font-weight: 700; line-height: 1.1; }
.mobile-cell .name { font-size: 8px; text-align: center; line-height: 1.3; margin-top: 2px; }

.cat-shots   { background: #E6F1FB; border-color: #85B7EB; color: #0C447C; }
.cat-equip   { background: #EAF3DE; border-color: #97C459; color: #27500A; }
.cat-campo   { background: #E1F5EE; border-color: #5DCAA5; color: #085041; }
.cat-score   { background: #FAEEDA; border-color: #EF9F27; color: #633806; }
.cat-jugador { background: #EEEDFE; border-color: #AFA9EC; color: #3C3489; }
.cat-rules   { background: #FAECE7; border-color: #F0997B; color: #4A1B0C; }
.cat-mental  { background: #FBEAF0; border-color: #ED93B1; color: #4B1528; }
.cat-tour    { background: #F1EFE8; border-color: #B4B2A9; color: #2C2C2A; }

.title-shots   { background: #E6F1FB; color: #0C447C; }
.title-equip   { background: #EAF3DE; color: #27500A; }
.title-campo   { background: #E1F5EE; color: #085041; }
.title-score   { background: #FAEEDA; color: #633806; }
.title-jugador { background: #EEEDFE; color: #3C3489; }
.title-rules   { background: #FAECE7; color: #4A1B0C; }
.title-mental  { background: #FBEAF0; color: #4B1528; }
.title-tour    { background: #F1EFE8; color: #2C2C2A; }

.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.45);
  align-items: center; justify-content: center; z-index: 100; padding: 1rem;
}
.modal-overlay.open { display: flex; }
.modal {
  background: #fff; border-radius: 16px; border: 0.5px solid #D3D1C7;
  padding: 1.6rem 1.4rem; max-width: 340px; width: 100%;
  position: relative; box-shadow: 0 10px 40px rgba(0,0,0,0.2);
}
.modal-close {
  position: absolute; top: 14px; right: 16px;
  background: #f5f4f0; border: none; cursor: pointer;
  font-size: 16px; color: #888780; width: 30px; height: 30px;
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
}
.modal-sym { font-size: 52px; font-weight: 700; line-height: 1; }
.modal-name { font-size: 22px; font-weight: 700; margin: 6px 0 3px; color: #1a1a18; }
.modal-cat { font-size: 12px; margin-bottom: 12px; color: #888780; }
.modal-desc { font-size: 15px; color: #444441; line-height: 1.65; }
.modal-fact { margin-top: 12px; font-size: 13px; color: #888780; border-top: 0.5px solid #D3D1C7; padding-top: 12px; }
.modal-fact span { font-weight: 600; color: #2C2C2A; }

footer { text-align: center; margin-top: 1.2rem; font-size: 12px; color: #B4B2A9; }
footer strong { color: #639922; }

@media (max-width: 680px) {
  .desktop-view { display: none; }
  .mobile-view { display: block; }
  header h1 { font-size: 19px; }
}
</style>
</head>

  {n:46,sym:"Fl",name:"Flop Shot",cat:"shots",col:18,row:4,desc:"La delicadeza máxima: alta, suave y que para cerca.",fact:"Phil Mickelson lo convirtió en arte. Riesgo altísimo, recompensa total"},

  {n:57,sym:"Rt",name:"Rotación",cat:"shots",col:11,row:5,desc:"La cadera manda el swing. Hombros y brazos la siguen.",fact:"Una cadera que rota 45° antes que los hombros = potencia máxima"},
  {n:58,sym:"Tp",name:"Tempo",cat:"mental",col:12,row:5,desc:"El ritmo del swing. No hay potencia sin tempo.",fact:"Freddie Couples y Ernie Els: el tempo más envidiado del golf"},

  {n:60,sym:"Ru",name:"Rutina",cat:"mental",col:14,row:5,desc:"La secuencia previa al golpe. El ancla mental del jugador.",fact:"Los pros tardan exactamente el mismo tiempo en cada golpe"},

  {n:62,sym:"Pz",name:"Presión",cat:"mental",col:16,row:5,desc:"El 18º hoyo con un golpe de ventaja. Aquí se decide todo.",fact:"Más opciones bajo presión = peor decisión. Simplifica siempre"},

];

const catColors = { shots:'cat-shots', equip:'cat-equip', campo:'cat-campo', score:'cat-score', jugador:'cat-jugador', rules:'cat-rules', mental:'cat-mental', tour:'cat-tour' };
const catNames = { shots:'Golpes', equip:'Equipamiento', campo:'Campo', score:'Puntuación', jugador:'Jugador', rules:'Reglas', mental:'Mental', tour:'Tour' };
const catOrder = ['score','shots','campo','equip','jugador','rules','mental','tour'];

// DESKTOP
const gd = document.getElementById('grid-desktop');
for (let r = 1; r <= 6; r++) {
  for (let c = 1; c <= 18; c++) {
    const el = elements.find(e => e.row === r && e.col === c);
    const div = document.createElement('div');
    div.className = 'cell ' + (el ? catColors[el.cat] : 'empty');
    if (el) {
      div.innerHTML = `<span class="num">${el.n}</span><span class="sym">${el.sym}</span><span class="name">${el.name}</span>`;
      div.onclick = () => openModal(el);
    } else { div.innerHTML = '&nbsp;'; }
    gd.appendChild(div);
  }
}

// MÓVIL
const mv = document.getElementById('mobile-view');
catOrder.forEach(cat => {
  const catEls = elements.filter(e => e.cat === cat).sort((a,b) => a.n - b.n);
  const section = document.createElement('div');
  section.className = 'cat-section';
  const title = document.createElement('div');
  title.className = `cat-title title-${cat}`;
  title.textContent = catNames[cat];
  section.appendChild(title);
  const mgrid = document.createElement('div');
  mgrid.className = 'mobile-grid';
  catEls.forEach(el => {
    const div = document.createElement('div');
    div.className = `mobile-cell ${catColors[el.cat]}`;
    div.innerHTML = `<span class="num">${el.n}</span><span class="sym">${el.sym}</span><span class="name">${el.name}</span>`;
    div.onclick = () => openModal(el);
    mgrid.appendChild(div);
  });
  section.appendChild(mgrid);
  mv.appendChild(section);
});

function openModal(el) {
  document.getElementById('mSym').textContent = el.sym;
  document.getElementById('mName').textContent = el.name;
  document.getElementById('mCat').textContent = catNames[el.cat] + '  ·  Elemento #' + el.n;
  document.getElementById('mDesc').textContent = el.desc;
  document.getElementById('mFact').innerHTML = '<span>Dato:</span> ' + el.fact;
  document.getElementById('overlay').classList.add('open');
}
document.getElementById('closeBtn').onclick = () => document.getElementById('overlay').classList.remove('open');
document.getElementById('overlay').onclick = (e) => { if (e.target === document.getElementById('overlay')) document.getElementById('overlay').classList.remove('open'); };
</script>
</body>
</html>
